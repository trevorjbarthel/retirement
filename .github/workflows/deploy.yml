name: Deploy to Cloudflare

# Deploys automatically when main is updated, and can still be run manually from
# the Actions tab. Runners deploy with your Cloudflare token from repo secrets;
# nothing sensitive lives in the repo.
#
# One-time setup before the first run:
#   1. Create the D1 database (Cloudflare dashboard -> D1 -> create "mtc-db", or once from a
#      machine you can `wrangler login` on: `npx wrangler d1 create mtc-db`).
#   2. Paste its database_id into wrangler.jsonc and commit.
#   3. Add repo secrets (Settings -> Secrets and variables -> Actions):
#        CLOUDFLARE_API_TOKEN  - a token with Workers Scripts:Edit + D1:Edit + Workers Routes as needed
#        CLOUDFLARE_ACCOUNT_ID - your account id
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run db:migrate:remote
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
